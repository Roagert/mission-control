<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0a0a12">
<title>🐾 Mission Control</title>
<style>
:root{--bg:#0a0a12;--bg2:#10101e;--bg3:#16162a;--bdr:rgba(0,212,255,.1);
  --cyan:#00d4ff;--lime:#39ff14;--red:#ff2d55;--orange:#ff9500;
  --gold:#ffd60a;--purple:#bf5af2;--text:#e8eaf6;--sub:#55607a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}

#pin-screen{position:fixed;inset:0;background:var(--bg);z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#pin-screen h2{font-size:18px;color:var(--cyan);letter-spacing:2px;font-family:monospace;}
#pin-input{background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:10px;
  color:#fff;font-size:20px;padding:12px 20px;outline:none;text-align:center;letter-spacing:4px;width:200px;}
#pin-input:focus{border-color:rgba(0,212,255,.4);}
#pin-error{color:var(--red);font-size:12px;display:none;}

.topbar{background:rgba(10,10,18,.97);border-bottom:1px solid var(--bdr);
  padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.logo{font-family:monospace;font-size:16px;font-weight:700;color:var(--cyan);letter-spacing:2px;}
.updated{font-size:11px;color:var(--sub);margin-left:auto;}
.refresh-btn{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2);color:var(--cyan);
  border-radius:7px;padding:4px 12px;cursor:pointer;font-size:11px;font-weight:700;}
.refresh-btn:hover{background:rgba(0,212,255,.2);}

.main{padding:16px;max-width:1000px;margin:0 auto;display:grid;gap:14px;}
@media(min-width:600px){.main{grid-template-columns:1fr 1fr;}}
@media(min-width:900px){.main{grid-template-columns:1fr 1fr 1fr;}}

.card{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:12px;overflow:hidden;}
.card-full{grid-column:1/-1;}
.ch{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:space-between;}
.ch-title{font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(0,212,255,.7);text-transform:uppercase;}
.ch-count{font-size:10px;color:var(--sub);font-weight:700;}
.cb{padding:12px;}

/* Action items */
.action-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;
  border-radius:8px;background:rgba(0,0,0,.3);margin-bottom:6px;border-left:3px solid transparent;}
.action-item.high{border-left-color:var(--red);}
.action-item.medium{border-left-color:var(--orange);}
.action-item.low{border-left-color:var(--sub);}
.action-title{font-size:13px;font-weight:600;flex:1;}
.action-title a{color:var(--cyan);text-decoration:none;}
.prio-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;white-space:nowrap;}
.prio-high{background:rgba(255,45,85,.15);color:var(--red);}
.prio-medium{background:rgba(255,149,0,.15);color:var(--orange);}
.prio-low{background:rgba(255,255,255,.06);color:var(--sub);}

/* Active now */
.active-item{display:flex;align-items:center;gap:10px;padding:8px 10px;
  background:rgba(57,255,20,.05);border:1px solid rgba(57,255,20,.1);border-radius:8px;margin-bottom:6px;}
.active-dot{width:8px;height:8px;border-radius:50%;background:var(--lime);
  animation:pulse 1.5s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.6;transform:scale(.8);}}
.active-task{font-size:13px;font-weight:600;flex:1;}
.active-meta{font-size:10px;color:var(--sub);}

/* Products */
.products-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.product-item{display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:rgba(0,0,0,.3);border-radius:8px;border:1px solid rgba(255,255,255,.04);}
.product-item a{text-decoration:none;color:var(--text);font-size:12px;font-weight:600;flex:1;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.s-live{background:var(--lime);box-shadow:0 0 6px var(--lime);}
.s-testing{background:var(--orange);}
.s-down{background:var(--red);animation:pulse .8s infinite;}

/* Crons */
.cron-row{display:flex;align-items:center;gap:8px;padding:7px 10px;
  border-bottom:1px solid rgba(255,255,255,.03);}
.cron-row:last-child{border-bottom:none;}
.cron-name{font-size:12px;font-weight:600;flex:1;}
.cron-sched{font-size:10px;color:var(--sub);font-family:monospace;}
.cron-status{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;}
.cs-ok{background:rgba(57,255,20,.1);color:var(--lime);}
.cs-error{background:rgba(255,45,85,.1);color:var(--red);}
.cs-paused{background:rgba(255,255,255,.06);color:var(--sub);}
.cron-last{font-size:10px;color:var(--sub);white-space:nowrap;}

/* Activity */
.activity-item{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.activity-item:last-child{border-bottom:none;}
.activity-time{font-size:10px;color:var(--sub);white-space:nowrap;padding-top:1px;min-width:50px;}
.activity-event{font-size:12px;flex:1;}

.empty{color:var(--sub);font-size:12px;text-align:center;padding:16px;opacity:.6;}
</style>
</head>
<body>

<div id="pin-screen">
  <div class="logo">🐾 MISSION CONTROL</div>
  <input id="pin-input" type="password" placeholder="PIN" maxlength="8" autofocus />
  <div id="pin-error">Forkert PIN</div>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <div class="logo">🐾 Mission Control</div>
    <div class="updated" id="updated-lbl">Opdaterer...</div>
    <button class="refresh-btn" onclick="loadData()">🔄 Opdater</button>
  </div>
  <div class="main">
    <div class="card card-full" id="action-card">
      <div class="ch"><div class="ch-title">🚨 Action Required</div><div class="ch-count" id="action-count">0</div></div>
      <div class="cb" id="action-body"><div class="empty">Ingen opgaver afventer</div></div>
    </div>
    <div class="card" id="active-card">
      <div class="ch"><div class="ch-title">⚡ Aktiv nu</div><div class="ch-count" id="active-count">0</div></div>
      <div class="cb" id="active-body"><div class="empty">Ingen aktive opgaver</div></div>
    </div>
    <div class="card">
      <div class="ch"><div class="ch-title">⏰ Cron Jobs</div></div>
      <div id="cron-body"></div>
    </div>
    <div class="card card-full">
      <div class="ch"><div class="ch-title">📊 Services</div></div>
      <div class="cb"><div class="products-grid" id="products-body"></div></div>
    </div>
    <div class="card card-full">
      <div class="ch"><div class="ch-title">📋 Seneste aktivitet</div></div>
      <div class="cb" id="activity-body"></div>
    </div>
  </div>
</div>

<script>
const PIN = '2810';
const DATA_URL = 'data/dashboard-data.json';

// PIN check
document.getElementById('pin-input').addEventListener('keydown', e => {
  if(e.key==='Enter'){
    const val = e.target.value;
    if(val===PIN){
      document.getElementById('pin-screen').style.display='none';
      document.getElementById('app').style.display='block';
      localStorage.setItem('mc-auth','1');
      loadData();setInterval(loadData,30000);
    } else {
      document.getElementById('pin-error').style.display='block';
      e.target.value='';
    }
  }
});

if(localStorage.getItem('mc-auth')==='1'){
  document.getElementById('pin-screen').style.display='none';
  document.getElementById('app').style.display='block';
  loadData();setInterval(loadData,30000);
}

function timeAgo(iso){
  if(!iso)return'—';
  const diff=Math.floor((Date.now()-new Date(iso))/1000);
  if(diff<60)return diff+'s siden';
  if(diff<3600)return Math.floor(diff/60)+'m siden';
  if(diff<86400)return Math.floor(diff/3600)+'t siden';
  return Math.floor(diff/86400)+'d siden';
}

async function loadData(){
  try{
    const r=await fetch(DATA_URL+'?t='+Date.now());
    const d=await r.json();
    render(d);
    document.getElementById('updated-lbl').textContent='Opdateret '+timeAgo(d.lastUpdated);
  }catch(e){
    document.getElementById('updated-lbl').textContent='Fejl ved hentning';
  }
}

function render(d){
  // Action required
  const actions=d.actionRequired||[];
  document.getElementById('action-count').textContent=actions.length;
  document.getElementById('action-body').innerHTML=actions.length?actions.map(a=>`
    <div class="action-item ${a.priority||'low'}">
      <div class="action-title">${a.url?`<a href="${a.url}" target="_blank">${a.title}</a>`:a.title}</div>
      <span class="prio-badge prio-${a.priority||'low'}">${(a.priority||'low').toUpperCase()}</span>
    </div>`).join(''):'<div class="empty">Ingen opgaver afventer</div>';

  // Active now
  const active=d.activeNow||[];
  document.getElementById('active-count').textContent=active.length;
  document.getElementById('active-body').innerHTML=active.length?active.map(a=>`
    <div class="active-item">
      <div class="active-dot"></div>
      <div class="active-task">${a.task}</div>
      <div class="active-meta">${a.model||''} · ${timeAgo(a.startedAt)}</div>
    </div>`).join(''):'<div class="empty">Ingen aktive opgaver</div>';

  // Products
  document.getElementById('products-body').innerHTML=(d.products||[]).map(p=>`
    <div class="product-item">
      <div class="status-dot s-${p.status||'live'}"></div>
      <a href="${p.url}" target="_blank">${p.name}</a>
    </div>`).join('');

  // Crons
  document.getElementById('cron-body').innerHTML=(d.crons||[]).map(c=>`
    <div class="cron-row">
      <div class="cron-name">${c.name}</div>
      <div class="cron-sched">${c.schedule}</div>
      <span class="cron-status cs-${c.status||'ok'}">${(c.status||'ok').toUpperCase()}</span>
      <div class="cron-last">${timeAgo(c.lastRun)}</div>
    </div>`).join('');

  // Activity
  document.getElementById('activity-body').innerHTML=(d.recentActivity||[]).length?
    (d.recentActivity||[]).map(a=>`
      <div class="activity-item">
        <div class="activity-time">${timeAgo(a.time)}</div>
        <div class="activity-event">${a.event}</div>
      </div>`).join(''):
    '<div class="empty">Ingen aktivitet</div>';
}
</script>
</body>
</html>
